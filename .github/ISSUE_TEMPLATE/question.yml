name: Question
description: Ask about usage or configuration.
title: '[question]: '
labels: ['question']
body:
  - type: markdown
    attributes:
      value: |
        Please check [docs/quickstart.md](https://github.com/kero168/agentsync/blob/main/docs/quickstart.md),
        the [README](https://github.com/kero168/agentsync#readme), and
        [examples/](https://github.com/kero168/agentsync/tree/main/examples)
        first — many usage questions are answered there.

  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: What are you trying to do?
      description: Your `agentsync.config.yaml` (or a relevant excerpt) and the command you ran, if applicable.
      render: yaml
